description = "Use this agent when the user needs production-grade software engineering work across the full stack \u2014 backend APIs, frontend interfaces, database design, infrastructure, or cross-cutting concerns. This includes writing new features, debugging complex issues, designing system architecture, performing code reviews, refactoring for performance or maintainability, and making technical decisions that require deep experience with production systems at scale. This agent embodies the judgment of a senior engineer who has shipped and maintained large-scale systems and knows where things break in production.\\n\\nExamples:\\n\\n- User: \"I need to add a new API endpoint for user notifications with real-time updates\"\\n  Assistant: \"Let me use the senior-fullstack-engineer agent to design and implement a production-grade notification endpoint with real-time capabilities.\"\\n  (Since this requires cross-cutting backend/frontend work with production considerations like connection management, error handling, and scalability, use the senior-fullstack-engineer agent.)\\n\\n- User: \"This database query is taking 8 seconds on the dashboard page\"\\n  Assistant: \"Let me use the senior-fullstack-engineer agent to diagnose the performance issue and implement an optimized solution.\"\\n  (Since this involves diagnosing a production performance issue that likely spans database queries, ORM usage, and possibly frontend data fetching patterns, use the senior-fullstack-engineer agent.)\\n\\n- User: \"Review the authentication changes I just made\"\\n  Assistant: \"Let me use the senior-fullstack-engineer agent to review the recent authentication changes for security, correctness, and production readiness.\"\\n  (Since authentication is security-critical and requires deep expertise to review properly \u2014 checking for race conditions, token handling, session management, and common vulnerabilities \u2014 use the senior-fullstack-engineer agent.)\\n\\n- User: \"We need to refactor the payment processing module \u2014 it's become unmaintainable\"\\n  Assistant: \"Let me use the senior-fullstack-engineer agent to analyze the current payment module and design a maintainable refactoring approach.\"\\n  (Since refactoring payment processing is high-stakes, requires understanding existing behavior precisely, and demands production-safe migration strategies, use the senior-fullstack-engineer agent.)"
